<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Collarx License Admin Login</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      .box { max-width: 420px; border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
      .error { color: #b00020; margin-bottom: 8px; }
      input { width: 100%; margin-bottom: 8px; padding: 8px; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <h1>License Admin Login</h1>
    <div class="box">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <input name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
