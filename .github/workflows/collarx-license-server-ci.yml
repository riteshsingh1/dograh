name: collarx-license-server-ci

on:
  push:
    paths:
      - "collarx-license-server/**"
      - ".github/workflows/collarx-license-server-ci.yml"
  pull_request:
    paths:
      - "collarx-license-server/**"
      - ".github/workflows/collarx-license-server-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install license server dependencies
        run: python -m pip install -e ./collarx-license-server
      - name: Compile license server app
        run: python -m compileall collarx-license-server/app
